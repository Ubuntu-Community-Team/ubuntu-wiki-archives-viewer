<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Wiki Archives</title>
    
    <!-- Import Ubuntu Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Sans:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ubuntu-orange: #E95420;
            --ubuntu-dark: #333333;
            --ubuntu-light: #f4f4f5;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: "Ubuntu Sans", system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
            color: var(--ubuntu-dark);
        }

        /* --- Main Layout Wrapper --- */
        #content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
        }

        /* --- Home / Search View --- */
        #search-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 40px 0;
        }

        .wiki-logo img {
            width: 100px;
        }

        #search-view h1 {
            font-size: 1.8rem;
            font-weight: 500;
            margin: 0 0 25px 0;
            color: #222;
        }

        .search-box-container {
            width: 100%;
            position: relative;
        }

        #main-search {
            width: 100%;
            padding: 14px 25px;
            font-size: 1rem;
            font-family: "Ubuntu Sans", sans-serif;
            border: 1.5px solid #222;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #main-search:focus {
            border-color: var(--ubuntu-orange);
            box-shadow: 0 0 0 3px rgba(233, 84, 32, 0.2);
        }

        /* --- Results & Article View --- */
        #results-view, #article-view {
            display: none;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            background-color: var(--ubuntu-light);
            border: 1px solid #ccc;
            color: var(--ubuntu-dark);
            padding: 8px 16px;
            border-radius: 6px;
            font-family: "Ubuntu Sans", sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #e4e4e7;
            border-color: #bbb;
        }

        .btn-orange {
            background-color: var(--ubuntu-orange);
            color: white;
            border: none;
        }

        .btn-orange:hover {
            background-color: #d14310;
        }

        /* Results List */
        .results-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .results-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .results-list li:hover {
            background-color: var(--ubuntu-light);
        }

        .results-list h3 {
            margin: 0 0 5px 0;
            color: var(--ubuntu-orange);
            font-size: 1.1rem;
        }

        .results-list .slug-text {
            font-size: 0.85rem;
            color: #666;
        }

        /* Article Content Box */
        #content-box {
            line-height: 1.6;
            font-size: 1.05rem;
        }

        #content-box h1, #content-box h2, #content-box h3 {
            color: var(--ubuntu-dark);
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        #content-box a {
            color: var(--ubuntu-orange);
            text-decoration: none;
            word-break: break-all;
        }

        #content-box a:hover {
            text-decoration: underline;
        }

        #content-box pre, pre#raw-source {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #eee;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        pre#raw-source {
            display: none;
        }

        .wiki-table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
            display: block;
            overflow-x: auto;
        }

        .wiki-table th, .wiki-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            min-width: 120px;
        }

        /* --- Footer --- */
        #footer {
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            width: 100%;
        }

        #footer a {
            color: #ffffff;
            text-decoration: none;
        }

        #footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="content-wrapper">
        
        <!-- HOME VIEW -->
        <div id="search-view">
            <div class="wiki-logo"><img src="assets/logo.svg" /></div>
            <h1>Ubuntu Wiki Archives</h1>
            <div class="search-box-container">
                <input type="text" id="main-search" placeholder="Search by title, keyword, or paste legacy Wiki URL..." onkeyup="handleSearchKey(event)">
            </div>
        </div>

        <!-- SEARCH RESULTS VIEW -->
        <div id="results-view">
            <div class="top-bar">
                <button class="btn" onclick="showHome()">← Back to Search</button>
                <span id="results-count" style="color: #666; font-size: 0.9rem;"></span>
            </div>
            <ul id="results-list" class="results-list"></ul>
        </div>

        <!-- ARTICLE READER VIEW -->
        <div id="article-view">
            <div class="top-bar">
                <button class="btn" onclick="showResultsOrHome()">← Back</button>
                <div style="display: flex; gap: 8px;">
                    <button id="copy-btn" class="btn btn-orange" onclick="copyRawWiki()">📋 Copy .wiki</button>
                    <button class="btn" onclick="toggleSourceView()">👁️ Toggle Source</button>
                </div>
            </div>
            <h1 id="article-title" style="color: var(--ubuntu-orange); margin-top: 0;"></h1>
            <div id="content-box"></div>
            <pre id="raw-source"></pre>
        </div>

    </div>

    <!-- FOOTER -->
    <div id="footer">
        Made with ❤️ by the Ubuntu Community | <a href="https://github.com/ubuntu/wiki-archives" target="_blank" rel="noopener">Ubuntu Wiki Archives</a> | <a href="https://github.com/Ubuntu-Community-Team/ubuntu-wiki-archives-viewer" target="_blank" rel="noopener">GitHub Repo</a>
    </div>

    <script>
        let indexData = [];
        let lastSearchResults = [];
        let currentRawWiki = "";
        let isSourceView = false;

        // Fetch index on initial page load
        fetch('index.json')
            .then(response => response.json())
            .then(data => {
                indexData = data;
            })
            .catch(err => console.error("Error loading index:", err));

        function handleSearchKey(event) {
            if (event.key === 'Enter') {
                executeSearch();
            }
        }

        function executeSearch() {
            const query = document.getElementById('main-search').value.trim();
            if (!query) return;

            // Check for old wiki URL
            let slugFromUrl = query.split('/').pop().trim();
            let directMatch = indexData.find(item => item.slug.toLowerCase() === slugFromUrl.toLowerCase());

            if (directMatch) {
                loadArticle(directMatch);
                return;
            }

            // Perform text search across titles & slugs
            const lowerQuery = query.toLowerCase();
            lastSearchResults = indexData.filter(item => 
                item.title.toLowerCase().includes(lowerQuery) || 
                item.slug.toLowerCase().includes(lowerQuery)
            );

            renderResults(lastSearchResults, query);
        }

        function renderResults(results, query) {
            document.getElementById('search-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'block';

            const resultsList = document.getElementById('results-list');
            const resultsCount = document.getElementById('results-count');
            resultsList.innerHTML = '';

            resultsCount.textContent = `${results.length} result(s) found for "${query}"`;

            if (results.length === 0) {
                resultsList.innerHTML = '<li style="cursor:default;">No matching articles found in the archive.</li>';
                return;
            }

            results.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<h3>${item.title}</h3><div class="slug-text">${item.slug}</div>`;
                li.onclick = () => loadArticle(item);
                resultsList.appendChild(li);
            });
        }

        function loadArticle(item) {
            document.getElementById('search-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';

            document.getElementById('article-title').textContent = item.title;
            const contentBox = document.getElementById('content-box');
            const rawSource = document.getElementById('raw-source');
            
            contentBox.innerHTML = "<em>Loading archive data...</em>";
            rawSource.textContent = "Loading raw source...";
            rawSource.style.display = 'none';
            isSourceView = false;

            fetch(item.rawUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Failed to fetch article file");
                    return response.text();
                })
                .then(text => {
                    currentRawWiki = text;
                    rawSource.textContent = text;
                    contentBox.innerHTML = parseWikiSyntax(text);
                    window.scrollTo(0, 0);
                })
                .catch(err => {
                    contentBox.innerHTML = "<span style='color:red;'>Error loading content: " + err.message + "</span>";
                });
        }

        function copyRawWiki() {
            if (!currentRawWiki) return;
            navigator.clipboard.writeText(currentRawWiki).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = "✅ Copied!";
                setTimeout(() => btn.textContent = "📋 Copy .wiki", 2000);
            });
        }

        function toggleSourceView() {
            const contentBox = document.getElementById('content-box');
            const rawSource = document.getElementById('raw-source');
            
            isSourceView = !isSourceView;
            if (isSourceView) {
                contentBox.style.display = 'none';
                rawSource.style.display = 'block';
            } else {
                contentBox.style.display = 'block';
                rawSource.style.display = 'none';
            }
        }

        function showHome() {
            document.getElementById('results-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'none';
            document.getElementById('search-view').style.display = 'flex';
            document.getElementById('main-search').value = '';
        }

        function showResultsOrHome() {
            if (lastSearchResults.length > 0) {
                document.getElementById('article-view').style.display = 'none';
                document.getElementById('results-view').style.display = 'block';
            } else {
                showHome();
            }
        }

        // --- Wiki Syntax Parser ---
        function parseWikiSyntax(rawContent) {
            let html = rawContent;

            // Strip historical warning blocks
            const warningRegex = /\{\|[\s\S]*?(?:'''|<strong>)?Warning(?:'''|<\/strong>)?[\s\S]*?\|\}/gi;
            html = html.replace(warningRegex, "");

            // Strip <nowiki> tags and TOC markers
            html = html.replace(/<\/?nowiki>/gi, '');
            html = html.replace(/__TOC__/g, '');

            // Check for MoinMoin line breaks
            html = html.replace(/\[\[BR\]\]/gi, '<br>');

            // Handle Code Blocks
            html = html.replace(/\{\{\{([\s\S]*?)\}\}\}/g, function(match, code) {
                return '<pre><code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;').trim() + '</code></pre>';
            });

            // Handle Headings
            html = html.replace(/^======\s*(.+?)\s*======$/gm, '<h6>$1</h6>');
            html = html.replace(/^=====\s*(.+?)\s*=====$/gm, '<h5>$1</h5>');
            html = html.replace(/^====\s*(.+?)\s*====$/gm, '<h4>$1</h4>');
            html = html.replace(/^===\s*(.+?)\s*===$/gm, '<h3>$1</h3>');
            html = html.replace(/^==\s*(.+?)\s*==$/gm, '<h2>$1</h2>');
            html = html.replace(/^=\s*(.+?)\s*=$/gm, '<h1>$1</h1>');

            // Handle Bold and Italics
            html = html.replace(/'''(.+?)'''/g, '<strong>$1</strong>');
            html = html.replace(/''(.+?)''/g, '<em>$1</em>');

            // Make URLs clickable
            html = html.replace(/\[\[(https?:\/\/[^|\]]+)\|([^\]]+)\]\]/g, '<a href="$1" target="_blank">$2</a>');
            html = html.replace(/\[\[([^|\]]+)\|([^\]]+)\]\]/g, '<a href="#$1">$2</a>');
            const nakedUrlRegex = /(?<!href=")(?<!src=")(https?:\/\/[^\s<]+)/gi;
            html = html.replace(nakedUrlRegex, '<a href="$1" target="_blank">$1</a>');

            // Handle Bullet Lists
            html = html.replace(/^\*\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

            // Format Wiki Tables
            html = html.replace(/\{\|([\s\S]*?)\|\}/g, function(match, innerContent) {
                let tableHtml = '<table class="wiki-table">';
                let rows = innerContent.split('|-');
                rows.forEach(row => {
                    if (row.trim() === '' || row.includes('class="wikitable"')) return;
                    tableHtml += '<tr>';
                    let cells = row.split('\n|');
                    cells.forEach(cell => {
                        let text = cell.trim();
                        if (text) {
                            text = text.replace(/^\|/, '').trim();
                            tableHtml += `<td>${text}</td>`;
                        }
                    });
                    tableHtml += '</tr>';
                });
                tableHtml += '</table>';
                return tableHtml;
            });

            // Wrap any loose text in paragraphs
            let blocks = html.split(/\r?\n\s*\r?\n/);
            blocks = blocks.map(block => {
                if (/^</.test(block.trim())) return block; 
                let cleanParagraph = block.trim().replace(/\r?\n|\r/g, ' ').replace(/\s+/g, ' ');
                return cleanParagraph ? '<p>' + cleanParagraph + '</p>' : '';
            });

            return blocks.join('\n');
        }
    </script>
</body>
</html>
